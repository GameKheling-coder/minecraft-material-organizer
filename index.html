<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sort Kering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Poppins;
background:#1e2a38;
color:white;
padding:20px;
}

h1{
text-align:center;
font-size:48px;
font-weight:900;
letter-spacing:2px;

background:linear-gradient(90deg,#ff3c00,#ff9f00,#00ffd5,#00a2ff,#9d00ff);
-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 10px rgba(255,255,255,0.3),
0 0 20px rgba(0,255,200,0.4);
}

.subtitle{
text-align:center;
opacity:.7;
margin-top:-10px;
}

textarea{
width:100%;
height:140px;
border-radius:10px;
border:none;
padding:10px;
background:#253547;
color:white;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:700;
cursor:pointer;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#31465f;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.group{
background:#3b526e;
font-weight:700;
}

.group span{
color:#7CFFB2;
}

#progressContainer{
width:100%;
height:18px;
background:#2d3f55;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

#progressBar{
width:0%;
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:.3s;
}

#progressText{
margin-top:5px;
font-size:13px;
opacity:.8;
}

</style>
</head>

<body>

<h1>Sort Kering</h1>
<div class="subtitle">by Game Kheling</div>

<textarea id="input" placeholder="Paste Litematica material list"></textarea>

<br><br>

<input type="file" id="fileInput" accept=".txt">

<button onclick="generate()">Generate</button>

<button onclick="exportExcel()">Export Excel</button>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="progressText">Progress: 0%</div>

<table id="table">

<thead>
<tr>
<th>✔</th>
<th>Block</th>
<th>Qty</th>
<th>Stacks</th>
<th>Double Chest</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let materials=[];

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0];
let reader=new FileReader();

reader.onload=function(e){
document.getElementById("input").value=e.target.result;
};

reader.readAsText(file);

});

function parseInput(){

let text=document.getElementById("input").value;

let lines=text.split("\n");

materials=[];

lines.forEach(line=>{

line=line.trim();

if(
line.startsWith("+") ||
line.startsWith("| Item") ||
line.includes("Material List") ||
line.includes("Missing")
){
return;
}

let match=line.match(/\|\s(.+?)\s+\|\s+(\d+)/);

if(match){

let name=match[1].trim();
let qty=parseInt(match[2]);

materials.push({
name:name,
qty:qty,
stacks:Math.floor(qty/64),
chest:Math.floor(qty/3456)
});

}

});

}

function baseName(name){

let removeWords=[
"Slab","Stairs","Planks","Log","Wood"
];

let base=name;

removeWords.forEach(w=>{
base=base.replace(w,"");
});

return base.trim();

}

function groupItems(){

let groups={};

materials.forEach(m=>{

let base=baseName(m.name);

if(!groups[base])
groups[base]=[];

groups[base].push(m);

});

return groups;

}

function generate(){

parseInput();

let groups=groupItems();

render(groups);

}

function render(groups){

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

for(let g in groups){

let rawTotal=0;

groups[g].forEach(m=>{

let name=m.name.toLowerCase();
let qty=m.qty;

if(name.includes("slab")){
let planks=(qty/6)*3;
rawTotal+=planks/4;
}

else if(name.includes("stairs")){
let planks=(qty/4)*6;
rawTotal+=planks/4;
}

else if(name.includes("planks")){
rawTotal+=qty/4;
}

else if(name.includes("log")){
rawTotal+=qty;
}

});

tbody.innerHTML+=`
<tr class="group">
<td><input type="checkbox" onclick="toggleGroup('${g}')"></td>
<td colspan="4">${g} | <span>RAW: ${Math.ceil(rawTotal)}</span></td>
</tr>
`;

groups[g].forEach(m=>{

tbody.innerHTML+=`
<tr data-group="${g}">
<td><input type="checkbox" onclick="updateProgress()"></td>
<td>${m.name}</td>
<td>${m.qty}</td>
<td>${m.stacks}</td>
<td>${m.chest}</td>
</tr>
`;

});

}

}

function toggleGroup(group){

let rows=document.querySelectorAll(`[data-group="${group}"] input`);

rows.forEach(r=>{
r.checked=!r.checked;
});

updateProgress();

}

function updateProgress(){

let checks=document.querySelectorAll("tbody input[type='checkbox']");

let total=checks.length;

let done=0;

checks.forEach(c=>{
if(c.checked) done++;
});

let percent=Math.floor((done/total)*100);

document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("progressText").innerText="Progress: "+percent+"%";

}

function exportExcel(){

let table=document.getElementById("table");

let wb=XLSX.utils.table_to_book(table,{sheet:"Materials"});

XLSX.writeFile(wb,"SortKeringMaterials.xlsx");

}

</script>

</body>
</html>
