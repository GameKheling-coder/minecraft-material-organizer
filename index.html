<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Litematica Sort Kering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Poppins;
background:#0f172a;
color:#e2e8f0;
padding:20px;
}

h1{
text-align:center;
font-size:50px;
font-weight:900;
letter-spacing:2px;

color:#38bdf8;

text-shadow:
-3px -3px 0 #0ea5e9,
3px -3px 0 #0ea5e9,
-3px 3px 0 #0ea5e9,
3px 3px 0 #0ea5e9,
0 0 20px #22d3ee;
}

.subtitle{
text-align:center;
margin-top:-10px;
opacity:.7;
}

textarea{
width:100%;
height:140px;
border:none;
border-radius:10px;
background:#1e293b;
color:white;
padding:10px;
}

.controls{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
background:#22c55e;
border:none;
padding:10px 16px;
border-radius:8px;
font-weight:700;
cursor:pointer;
color:white;
}

select{
padding:8px;
border-radius:6px;
border:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#334155;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.group{
background:#1e3a5f;
font-weight:700;
}

.group span{
color:#4ade80;
}

#progressContainer{
width:100%;
height:18px;
background:#1e293b;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

#progressBar{
width:0%;
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:.3s;
}

#progressText{
margin-top:5px;
font-size:13px;
opacity:.8;
}

</style>
</head>

<body>

<h1>Litematica Sort Kering</h1>
<div class="subtitle">Minecraft Material Organizer</div>

<textarea id="input" placeholder="Paste Litematica material list"></textarea>

<div class="controls">

<input type="file" id="fileInput" accept=".txt">

<button onclick="generate()">Generate</button>

<button onclick="exportExcel()">Export Excel</button>

<select id="sortSelect" onchange="generate()">

<option value="none">Sort</option>
<option value="az">Alphabetical A → Z</option>
<option value="za">Alphabetical Z → A</option>
<option value="low">Qty Low → High</option>
<option value="high">Qty High → Low</option>

</select>

<label>
<input type="checkbox" id="rawToggle" checked onchange="generate()">
RAW Calculator
</label>

</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="progressText">
Progress: 0%
</div>

<table id="table">

<thead>
<tr>
<th>✔</th>
<th>Block</th>
<th>Qty</th>
<th>Stacks</th>
<th>Double Chest</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let materials=[]

const materialGroups=[
"Oak","Spruce","Birch","Jungle","Acacia","Dark Oak","Mangrove","Cherry","Bamboo",
"Cobblestone","Stone","Granite","Diorite","Andesite",
"Blackstone","Deepslate","Sandstone","Red Sandstone","Prismarine","End Stone"
]

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0]
let reader=new FileReader()

reader.onload=function(e){
document.getElementById("input").value=e.target.result
}

reader.readAsText(file)

})

function detectGroup(name){

for(let g of materialGroups){

if(name.toLowerCase().includes(g.toLowerCase()))
return g

}

return "Miscellaneous"

}

function parseInput(){

let text=document.getElementById("input").value

let lines=text.split("\n")

materials=[]

lines.forEach(line=>{

line=line.trim()

if(
line.startsWith("+") ||
line.startsWith("| Item") ||
line.includes("Material List") ||
line.includes("Missing")
) return

let match=line.match(/\|\s(.+?)\s+\|\s+(\d+)/)

if(match){

let name=match[1].trim()
let qty=parseInt(match[2])

materials.push({
name:name,
qty:qty,
stacks:Math.floor(qty/64),
chest:Math.floor(qty/3456)
})

}

})

}

function groupItems(){

let groups={}

materials.forEach(m=>{

let g=detectGroup(m.name)

if(!groups[g]) groups[g]=[]

groups[g].push(m)

})

return groups

}

function sortItems(arr){

let mode=document.getElementById("sortSelect").value

if(mode=="az") arr.sort((a,b)=>a.name.localeCompare(b.name))
if(mode=="za") arr.sort((a,b)=>b.name.localeCompare(a.name))
if(mode=="low") arr.sort((a,b)=>a.qty-b.qty)
if(mode=="high") arr.sort((a,b)=>b.qty-a.qty)

}

function generate(){

parseInput()

let groups=groupItems()

render(groups)

}

function render(groups){

let tbody=document.querySelector("#table tbody")

tbody.innerHTML=""

let rawEnabled=document.getElementById("rawToggle").checked

for(let g in groups){

let arr=groups[g]

sortItems(arr)

let rawTotal=0

if(rawEnabled){

arr.forEach(m=>{

let name=m.name.toLowerCase()
let qty=m.qty

if(name.includes("slab")){
let planks=(qty/6)*3
rawTotal+=planks/4
}

else if(name.includes("stairs")){
let planks=(qty/4)*6
rawTotal+=planks/4
}

else if(name.includes("planks")){
rawTotal+=qty/4
}

else if(name.includes("log")){
rawTotal+=qty
}

})

}

tbody.innerHTML+=`

<tr class="group">
<td><input type="checkbox" onclick="toggleGroup('${g}')"></td>
<td colspan="4">${g} | <span>RAW: ${Math.ceil(rawTotal)}</span></td>
</tr>
`

arr.forEach(m=>{

tbody.innerHTML+=`

<tr data-group="${g}">
<td><input type="checkbox" onclick="updateProgress()"></td>
<td>${m.name}</td>
<td>${m.qty}</td>
<td>${m.stacks}</td>
<td>${m.chest}</td>
</tr>

`

})

}

}

function toggleGroup(group){

let rows=document.querySelectorAll(`[data-group="${group}"] input`)

rows.forEach(r=>{
r.checked=!r.checked
})

updateProgress()

}

function updateProgress(){

let checks=document.querySelectorAll("tbody input[type='checkbox']")

let total=checks.length
let done=0

checks.forEach(c=>{
if(c.checked) done++
})

let percent=Math.floor((done/total)*100)

document.getElementById("progressBar").style.width=percent+"%"
document.getElementById("progressText").innerText="Progress: "+percent+"%"

}

function exportExcel(){

let table=document.getElementById("table")

let wb=XLSX.utils.table_to_book(table,{sheet:"Materials"})

XLSX.writeFile(wb,"LitematicaMaterials.xlsx")

}

</script>

</body>
</html>
