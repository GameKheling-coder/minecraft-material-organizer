<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sort Kering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>

body{
font-family:Poppins;
background:#0f172a;
color:white;
padding:20px;
}

h1{
text-align:center;
font-size:50px;
font-weight:900;
letter-spacing:2px;

background:linear-gradient(90deg,#ff3c00,#ff9f00,#00ffd5,#00a2ff,#9d00ff);
-webkit-background-clip:text;
color:transparent;

text-shadow:
0 0 10px rgba(255,255,255,0.3),
0 0 20px rgba(0,255,200,0.4);
}

.subtitle{
text-align:center;
opacity:.7;
margin-top:-10px;
}

textarea{
width:100%;
height:140px;
background:#1e293b;
border:none;
border-radius:10px;
padding:10px;
color:white;
}

.controls{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
background:#38bdf8;
border:none;
padding:10px 16px;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

input[type="text"]{
padding:8px;
border-radius:6px;
border:none;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#334155;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.group{
background:#475569;
font-weight:700;
}

.icon{
width:24px;
height:24px;
image-rendering:pixelated;
}

</style>

</head>

<body>

<h1>Sort Kering</h1>
<div class="subtitle">by Game Kheling</div>

<textarea id="input" placeholder="Paste Litematica material list"></textarea>

<div class="controls">

<input type="file" id="fileInput" accept=".txt">

<button onclick="generate()">Generate</button>

<button onclick="sortByQty()">Sort by Qty</button>

<button onclick="exportExcel()">Export Excel</button>

<input type="text" id="search" placeholder="Search block..." oninput="filterTable()">

</div>

<table id="table">

<thead>
<tr>
<th>Icon</th>
<th>Block</th>
<th>Qty</th>
<th>Stacks</th>
<th>Double Chest</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let materials=[];

document.getElementById("fileInput").addEventListener("change",function(){

let file=this.files[0];
let reader=new FileReader();

reader.onload=function(e){
document.getElementById("input").value=e.target.result;
};

reader.readAsText(file);

});

function parseInput(){

let text=document.getElementById("input").value;

let lines=text.split("\n");

materials=[];

lines.forEach(line=>{

line=line.trim();

if(
line.startsWith("+") ||
line.startsWith("| Item") ||
line.includes("Material List") ||
line.includes("Missing")
){
return;
}

let match=line.match(/\|\s(.+?)\s+\|\s+(\d+)/);

if(match){

let name=match[1].trim();
let qty=parseInt(match[2]);

materials.push({
name:name,
qty:qty,
stacks:Math.floor(qty/64),
chest:Math.floor(qty/3456)
});

}

});

}

function groupName(name){

let woods=["Oak","Spruce","Birch","Jungle","Acacia","Dark Oak"];

let stones=["Stone","Cobblestone","Granite","Diorite","Andesite"];

for(let w of woods){
if(name.includes(w)) return "Wood";
}

for(let s of stones){
if(name.includes(s)) return "Stone";
}

return "Miscellaneous";

}

function iconURL(name){

let file=name.toLowerCase().replace(/ /g,"_");

return `https://raw.githubusercontent.com/PrismarineJS/minecraft-assets/master/data/1.20/items/${file}.png`;

}

function generate(){

parseInput();

let groups={};

materials.forEach(m=>{

let g=groupName(m.name);

if(!groups[g]) groups[g]=[];

groups[g].push(m);

});

render(groups);

}

function render(groups){

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

let order=["Wood","Stone","Miscellaneous"];

order.forEach(g=>{

if(!groups[g]) return;

tbody.innerHTML+=`
<tr class="group">
<td colspan="5">${g}</td>
</tr>
`;

groups[g].forEach(m=>{

tbody.innerHTML+=`
<tr>
<td><img class="icon" src="${iconURL(m.name)}"></td>
<td>${m.name}</td>
<td>${m.qty}</td>
<td>${m.stacks}</td>
<td>${m.chest}</td>
</tr>
`;

});

});

}

function sortByQty(){

materials.sort((a,b)=>b.qty-a.qty);

let groups={"All":materials};

render(groups);

}

function filterTable(){

let input=document.getElementById("search").value.toLowerCase();

let rows=document.querySelectorAll("#table tbody tr");

rows.forEach(r=>{

let text=r.innerText.toLowerCase();

if(text.includes(input))
r.style.display="";
else
r.style.display="none";

});

}

function exportExcel(){

let table=document.getElementById("table");

let wb=XLSX.utils.table_to_book(table,{sheet:"Materials"});

XLSX.writeFile(wb,"SortKeringMaterials.xlsx");

}

</script>

</body>
</html>
