<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sort Kering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg1:#141e30;
--bg2:#243b55;
--card:#ffffff10;
--text:white;
--accent:#6ee7b7;
}

body{
background:linear-gradient(135deg,var(--bg1),var(--bg2));
font-family:Poppins;
color:var(--text);
text-align:center;
padding:20px;
transition:0.3s;
}

.light{
--bg1:#f0f4ff;
--bg2:#ffffff;
--card:#ffffff;
--text:#222;
}

h1{
font-size:40px;
background:linear-gradient(90deg,#ff7a18,#32d2aa,#4facfe);
-webkit-background-clip:text;
color:transparent;
margin-bottom:0;
}

.subtitle{
font-size:14px;
opacity:0.8;
margin-bottom:20px;
}

textarea{
width:95%;
height:150px;
background:var(--card);
color:var(--text);
border:none;
border-radius:10px;
padding:10px;
}

button{
margin:6px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#34d399;
color:black;
font-weight:bold;
}

button:hover{
background:#10b981;
}

.settings{
margin-top:20px;
background:var(--card);
padding:15px;
border-radius:10px;
text-align:left;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:var(--card);
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #00000020;
}

.group{
background:#00000020;
font-weight:bold;
}

.raw{
background:#00000015;
color:#7ef9b4;
font-size:13px;
}

#progressContainer{
width:100%;
background:#00000020;
border-radius:10px;
margin-top:10px;
}

#progressBar{
width:0%;
height:18px;
background:#22c55e;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Sort Kering</h1>
<div class="subtitle">Game Kheling</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<p id="progressText">Progress: 0%</p>

<textarea id="input" placeholder="Paste Litematica material list"></textarea>

<br>

<button onclick="generate()">Generate Checklist</button>
<button onclick="exportCSV()">Export Excel</button>
<button onclick="toggleMode()">Light / Dark</button>

<div class="settings">

<h3>Settings</h3>

<label>
<input type="checkbox" id="groupToggle" checked>
Smart Grouping
</label>
<br>

<label>
<input type="checkbox" id="stackToggle" checked>
Show Stacks
</label>
<br>

<label>
<input type="checkbox" id="chestToggle" checked>
Show Double Chests
</label>
<br>

<label>
<input type="checkbox" id="rawToggle" checked>
Enable RAW Calculation
</label>

</div>

<table id="table">

<thead>
<tr>
<th>Done</th>
<th>Block</th>
<th>Qty</th>
<th>Stacks</th>
<th>Double Chests</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let materials=[];

function parseInput(){

let text=document.getElementById("input").value.trim();

let lines=text.split("\n");

materials=[];

lines.forEach(line=>{

let match=line.match(/(.+?)[ :]+(\d+)/);

if(match){

let name=match[1].trim();
let qty=parseInt(match[2]);

materials.push({
name:name,
qty:qty,
stacks:Math.floor(qty/64),
chest:Math.floor(qty/3456)
});

}

});

}

function groupName(name){

let woods=["Oak","Spruce","Birch","Jungle","Acacia","Dark Oak","Mangrove","Cherry"];

let stones=["Stone","Cobblestone","Deepslate","Blackstone","Granite","Diorite","Andesite"];

for(let w of woods){

if(name.startsWith(w)) return w;

}

for(let s of stones){

if(name.includes(s)) return s;

}

return "Other";

}

function generate(){

parseInput();

let useGrouping=document.getElementById("groupToggle").checked;

let groups={};

materials.forEach(m=>{

let g=useGrouping?groupName(m.name):"All";

if(!groups[g]) groups[g]=[];

groups[g].push(m);

});

render(groups);

}

function render(groups){

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

let showStacks=document.getElementById("stackToggle").checked;

let showChest=document.getElementById("chestToggle").checked;

let rawEnabled=document.getElementById("rawToggle").checked;

for(let g in groups){

let rawTotal=0;

if(rawEnabled){

groups[g].forEach(m=>{

let name=m.name.toLowerCase();
let qty=m.qty;

if(name.includes("slab")) rawTotal+=(qty/6*3)/4;
else if(name.includes("stairs")) rawTotal+=(qty/4*6)/4;
else if(name.includes("planks")) rawTotal+=qty/4;
else if(name.includes("log")) rawTotal+=qty;

});

}

tbody.innerHTML+=`
<tr class="raw">
<td><input type="checkbox" onclick="toggleGroup(this)"></td>
<td colspan="4">RAW ${g}: ${Math.ceil(rawTotal)}</td>
</tr>
`;

tbody.innerHTML+=`
<tr class="group">
<td></td>
<td colspan="4">${g}</td>
</tr>
`;

groups[g].forEach(m=>{

let stacks=showStacks?m.stacks:"-";
let chest=showChest?m.chest:"-";

tbody.innerHTML+=`
<tr>
<td><input type="checkbox" onclick="updateProgress()"></td>
<td>${m.name}</td>
<td>${m.qty}</td>
<td>${stacks}</td>
<td>${chest}</td>
</tr>
`;

});

}

}

function toggleGroup(box){

let row=box.closest("tr");

let next=row.nextElementSibling;

while(next && !next.classList.contains("raw")){

if(next.querySelector("input")){
next.querySelector("input").checked=box.checked;
}

next=next.nextElementSibling;

}

updateProgress();

}

function updateProgress(){

let checks=document.querySelectorAll("tbody input[type=checkbox]");

let done=0;

checks.forEach(c=>{
if(c.checked) done++;
});

let percent=Math.floor(done/checks.length*100);

document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("progressText").innerText="Progress: "+percent+"%";

}

function exportCSV(){

let csv="Block,Quantity,Stacks,DoubleChests\n";

materials.forEach(m=>{
csv+=`${m.name},${m.qty},${m.stacks},${m.chest}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="materials.csv";

a.click();

}

function toggleMode(){

document.body.classList.toggle("light");

}

</script>

</body>
</html>
