<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Minecraft Material Organizer</title>

<style>

body{
background:linear-gradient(135deg,#1b1b1b,#0f2027);
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

textarea{
width:95%;
height:160px;
background:#222;
color:white;
border:none;
border-radius:10px;
padding:10px;
}

button{
margin:6px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#4CAF50;
color:white;
font-size:14px;
}

button:hover{
background:#66d46c;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
}

th,td{
padding:10px;
border-bottom:1px solid #333;
}

</style>
</head>

<body>

<h2>Minecraft Material Organizer</h2>

<textarea id="input" placeholder="Paste Litematica material list"></textarea>

<br>

<button onclick="generateTable()">Generate List</button>
<button onclick="exportCSV()">Export Excel</button>

<table id="table">
<thead>
<tr>
<th>Done</th>
<th>Block</th>
<th>Quantity</th>
<th>Stacks</th>
</tr>
</thead>

<tbody></tbody>

</table>

<script>

let materials=[];

function generateTable(){

let text=document.getElementById("input").value.trim();

let lines=text.split("\n");

materials=[];

lines.forEach(line=>{

let match=line.match(/(.+?)[ :]+(\d+)/);

if(match){

let name=match[1].trim();
let qty=parseInt(match[2]);

materials.push({
name:name,
qty:qty,
stacks:Math.floor(qty/64)
});

}

});

renderTable();

}

function renderTable(){

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

materials.forEach((m,i)=>{

let row=`
<tr>
<td><input type="checkbox"></td>
<td>${m.name}</td>
<td>${m.qty}</td>
<td>${m.stacks}</td>
</tr>
`;

tbody.innerHTML+=row;

});

}

function exportCSV(){

let csv="Block,Quantity,Stacks\n";

materials.forEach(m=>{
csv+=`${m.name},${m.qty},${m.stacks}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="minecraft_materials.csv";

a.click();

}

</script>

</body>
</html>
