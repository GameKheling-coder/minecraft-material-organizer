<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sort Kering</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:#1e2a38;
color:white;
padding:20px;
transition:0.3s;
}

.light{
background:#f3f6fb;
color:#111;
}

h1{
text-align:center;
font-size:42px;
font-weight:800;
background:linear-gradient(90deg,#ff7a18,#32d2aa,#5aa9ff);
-webkit-background-clip:text;
color:transparent;
}

.subtitle{
text-align:center;
margin-top:-8px;
margin-bottom:20px;
font-size:14px;
opacity:0.8;
}

textarea{
width:100%;
height:140px;
border-radius:10px;
border:none;
padding:10px;
background:#253547;
color:white;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:8px;
background:#38bdf8;
color:white;
font-weight:600;
cursor:pointer;
}

.settings{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#253547;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th{
background:#31465f;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid rgba(255,255,255,0.05);
}

.group{
background:#3b526e;
font-weight:700;
font-size:16px;
}

.group span{
color:#7CFFB2;
font-weight:700;
}

#progressContainer{
width:100%;
height:18px;
background:#2d3f55;
border-radius:10px;
margin-top:15px;
overflow:hidden;
}

#progressBar{
width:0%;
height:100%;
background:linear-gradient(90deg,#22c55e,#4ade80);
transition:0.3s;
}

#progressText{
margin-top:5px;
font-size:13px;
opacity:0.8;
}

.footer{
text-align:center;
margin-top:40px;
font-size:14px;
}

.footer a{
color:#38bdf8;
text-decoration:none;
font-weight:600;
}

</style>

</head>

<body>

<h1>Sort Kering</h1>
<div class="subtitle">by Game Kheling</div>

<textarea id="input" placeholder="Paste Litematica list here"></textarea>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="progressText">Progress: 0%</div>

<br>

<button onclick="generate()">Generate List</button>

<div class="settings">

<label>
<input type="checkbox" checked onclick="toggleTheme()">
Light / Dark Mode
</label>

<br>

<label>
<input type="checkbox" id="stackToggle" checked>
Show Stacks
</label>

<br>

<label>
<input type="checkbox" id="chestToggle" checked>
Show Double Chests
</label>

<br>

<label>
<input type="checkbox" id="rawToggle" checked>
Enable RAW Calculation
</label>

</div>

<table id="table">

<thead>
<tr>
<th>Done</th>
<th>Block</th>
<th>Qty</th>
<th>Stacks</th>
<th>Double Chests</th>
</tr>
</thead>

<tbody></tbody>

</table>

<div class="footer">
Instagram :
<a href="https://www.instagram.com/game_kheling?igsh=MXVqcDB2cTVqdmsyZQ==" target="_blank">
game_kheling
</a>
</div>

<script>

let materials=[];

function parseInput(){

let text=document.getElementById("input").value.trim();

let lines=text.split("\n");

materials=[];

lines.forEach(line=>{

let match=line.match(/(.+?)[ :]+(\d+)/);

if(match){

let name=match[1].trim();

let qty=parseInt(match[2]);

materials.push({
name:name,
qty:qty,
stacks:Math.floor(qty/64),
chest:Math.floor(qty/3456)
});

}

});

}

function groupName(name){

let woods=["Oak","Spruce","Birch","Jungle","Acacia","Dark Oak","Mangrove","Cherry"];

let stones=["Stone","Cobblestone","Deepslate","Blackstone","Granite","Diorite","Andesite"];

for(let w of woods){
if(name.startsWith(w)) return w;
}

for(let s of stones){
if(name.includes(s)) return s;
}

return "Other";

}

function generate(){

parseInput();

let groups={};

materials.forEach(m=>{

let g=groupName(m.name);

if(!groups[g]) groups[g]=[];

groups[g].push(m);

});

render(groups);

}

function render(groups){

let tbody=document.querySelector("#table tbody");

tbody.innerHTML="";

let showStacks=document.getElementById("stackToggle").checked;

let showChest=document.getElementById("chestToggle").checked;

let rawEnabled=document.getElementById("rawToggle").checked;

for(let g in groups){

let rawTotal=0;

groups[g].forEach(m=>{

let name=m.name.toLowerCase();
let qty=m.qty;

if(rawEnabled){

if(name.includes("slab")){

let planks=(qty/6)*3;
rawTotal+=planks/4;

}

else if(name.includes("stairs")){

let planks=(qty/4)*6;
rawTotal+=planks/4;

}

else if(name.includes("planks")){

rawTotal+=qty/4;

}

else if(name.includes("log")){

rawTotal+=qty;

}

}

});

tbody.innerHTML+=`
<tr class="group">
<td>
<input type="checkbox" onclick="toggleGroup('${g}')">
</td>
<td colspan="4">
${g.toUpperCase()} | <span>RAW: ${Math.ceil(rawTotal)}</span>
</td>
</tr>
`;

groups[g].forEach(m=>{

let stacks=showStacks?m.stacks:"-";

let chest=showChest?m.chest:"-";

tbody.innerHTML+=`
<tr data-group="${g}">
<td><input type="checkbox" onclick="updateProgress()"></td>
<td>${m.name}</td>
<td>${m.qty}</td>
<td>${stacks}</td>
<td>${chest}</td>
</tr>
`;

});

}

}

function toggleGroup(group){

let rows=document.querySelectorAll(`[data-group="${group}"] input`);

rows.forEach(r=>{
r.checked=!r.checked;
});

updateProgress();

}

function updateProgress(){

let checks=document.querySelectorAll("tbody input[type='checkbox']");

let total=checks.length;

let done=0;

checks.forEach(c=>{
if(c.checked) done++;
});

let percent=Math.floor((done/total)*100);

document.getElementById("progressBar").style.width=percent+"%";

document.getElementById("progressText").innerText="Progress: "+percent+"%";

}

function toggleTheme(){

document.body.classList.toggle("light");

}

</script>

</body>
</html>
